<mat-form-field>
    <mat-icon matPrefix>search</mat-icon>
    <mat-label>{{ title }}</mat-label>
    <input (keyup.enter)="enter.emit()"
           (ngModelChange)="valueChange.emit($event)"
           [(ngModel)]="value"
           [type]="type"
           matInput>
    <button (click)="clearModel(); enter.emit()" [disabled]="!value" mat-icon-button matSuffix>
        <mat-icon>close</mat-icon>
    </button>
</mat-form-field>

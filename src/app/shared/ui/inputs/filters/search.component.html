<mat-form-field class="full-width">
    <mat-icon matPrefix>search</mat-icon>
    <mat-label>{{ title }}</mat-label>
    <input (keyup.enter)="onRenew()"
           [(ngModel)]="inputValue"
           [matAutocomplete]="auto"
           [required]="obligatory"
           matInput
           type="text"
    >
    <button (click)="resetKey()" [disabled]="!inputValue" aria-label="Clear" mat-icon-button matSuffix>
        <mat-icon>close</mat-icon>
    </button>
    <mat-autocomplete #auto="matAutocomplete" class="app-search-options">
        @if (keys | async; as options) {
            @for (option of options; track $index) {
                <mat-option (click)="onClick(option)" [value]="option">
                    @if (!keyView.length) {
                        {{ option }}
                    } @else {
                        @for (key of keyView; track $index; let last = $last) {
                            {{ resolve(option, key) }}@if (!last) {
                                ,
                            }
                        }
                    }
                </mat-option>
            }
        } @else {
            <mat-option disabled>Cargando...</mat-option>
        }
    </mat-autocomplete>
</mat-form-field>

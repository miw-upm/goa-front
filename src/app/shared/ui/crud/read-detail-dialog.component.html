<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
    @if (object) {
        @for (key of labels(object); track key) {
            <div>
                <strong>{{ key | uppercaseWords }}:</strong>
                <app-data-cell [fullList]="true" [value]="object[key]"></app-data-cell>
            </div>
        }
    }
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-dialog-close mat-flat-button>Cerrar</button>
</mat-dialog-actions>

<h3 mat-dialog-title>{{ data?.title ?? 'Operación peligrosa' }}</h3>

<mat-dialog-content>
    <p>{{ data?.message ?? 'Escribe el texto de confirmación para continuar.' }}</p>
    <p><strong>Escribe exactamente: {{ data.expectedText }}</strong></p>

    <mat-form-field appearance="outline">
        <mat-label>Confirmación</mat-label>
        <input matInput
               [formControl]="input"
               [placeholder]="data.expectedText ?? ''"
               (keyup.enter)="confirm()"
               autocomplete="off"/>
    </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-flat-button class="warn" [disabled]="!canConfirm" (click)="confirm()">Eliminar</button>
</mat-dialog-actions>

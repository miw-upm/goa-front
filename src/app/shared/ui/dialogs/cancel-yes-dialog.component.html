<h3 mat-dialog-title>{{ data?.title ?? 'Operación peligrosa' }}</h3>

<mat-dialog-content>
    <p>{{ data?.message ?? '¿Estás seguro?' }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-flat-button class="warn" [mat-dialog-close]="true">Sí</button>
</mat-dialog-actions>

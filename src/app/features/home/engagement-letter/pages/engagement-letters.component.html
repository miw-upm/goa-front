<mat-button-toggle-group (change)="search()" [(ngModel)]="criteria.opened">
    <mat-button-toggle [value]="null">Todos</mat-button-toggle>
    <mat-button-toggle [value]="true">Abierto</mat-button-toggle>
    <mat-button-toggle [value]="false">Cerrado</mat-button-toggle>
</mat-button-toggle-group>

<mat-button-toggle-group (change)="search()" [(ngModel)]="criteria.budgetOnly">
    <mat-button-toggle [value]="null">Todos</mat-button-toggle>
    <mat-button-toggle [value]="true">Presupuesto</mat-button-toggle>
    <mat-button-toggle [value]="false">Hoja</mat-button-toggle>
</mat-button-toggle-group>

<app-filter-input (enter)="search()" [(value)]="criteria.client" title="Cliente"></app-filter-input>
<app-filter-input (enter)="search()" [(value)]="criteria.legalProcedureTitle"
                  title="Titulo del Procedimiento"></app-filter-input>
<app-filter-input (enter)="search()" [(value)]="criteria.taskTitle" title="Tarea"></app-filter-input>

<app-crud (assistant)="openAssistant($event)"
          (create)="create()"
          (delete)="delete($event)"
          (link)="link($event)" (print)="print($event)" (read)="read($event)"
          (searchAll)="search()" (update)="update($event)"
          [assistantAction]="true" [changeFields]="changeFields"
          [data]="engagementLetters"
          [deleteAction]=deleteVisibility [hiddenFields]="hiddenFields"

          [item]="engagementLetter"
          [linkAction]="true"
          [printAction]="true"
          [secureDelete]="true"
          [title]="title">
</app-crud>

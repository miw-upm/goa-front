<mat-button-toggle-group (change)="search()" [(ngModel)]="criteria.opened">
    <mat-button-toggle [value]="null">Todos</mat-button-toggle>
    <mat-button-toggle [value]="true">Abierto</mat-button-toggle>
    <mat-button-toggle [value]="false">Cerrado</mat-button-toggle>
</mat-button-toggle-group>
<app-filter-input (enter)="search()" [(value)]="criteria.owner" title="Responsable"></app-filter-input>
<app-filter-input (enter)="search()" [(value)]="criteria.legalProcedureTitle"
                  title="Titulo del Procedimiento"></app-filter-input>
<app-filter-input (enter)="search()" [(value)]="criteria.taskTitle" title="Tarea"></app-filter-input>

<app-crud (alerts)="navigateToAlerts($event)" (assistant)="openAssistant($event)" (create)="create()" (delete)="delete($event)"
          (events)="navigateToEvents($event)" (print)="print($event)"
          (publicLink)="generatePublicLink($event)"
          (read)="read($event)"
          (searchAll)="search()"
          (update)="update($event)"
          [alertsAction]="true"
          [assistantAction]="true" [data]="engagementLetters"
          [deleteAction]=deleteVisibility
          [eventsAction]="true"
          [hiddenFields]="['id','discount','attachments','paymentMethods','legalClause']"
          [item]="engagementLetter"
          [printAction]="true" [publicLinkAction]="true"
          [secureDelete]="true" [title]="title">
</app-crud>

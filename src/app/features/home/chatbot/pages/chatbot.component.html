<section class="chatbot-page">
    <h2>Asistente conversacional</h2>

    <div class="messages-container">
        <div *ngFor="let item of messages" class="message" [ngClass]="item.sender.toLowerCase()">
            <strong>{{ item.sender === 'USER' ? 'Tú' : 'Asistente' }}</strong>
            <p>{{ item.content }}</p>
        </div>

        <div *ngIf="loading" class="message assistant">
            <strong>Asistente</strong>
            <p>Escribiendo...</p>
        </div>
    </div>

    <p *ngIf="error" class="error-message">
        {{ error }}
    </p>

    <mat-form-field class="full-width">
        <mat-label>Mensaje</mat-label>
        <textarea [(ngModel)]="message" matInput placeholder="Escribe tu consulta"></textarea>
    </mat-form-field>

    <button (click)="send()" [disabled]="!message?.trim() || loading" color="primary" mat-raised-button>
        Enviar
    </button>
</section>

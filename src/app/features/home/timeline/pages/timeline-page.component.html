<div class="timeline-container">

<h2>Timeline</h2>
    <div class="filters">


        <mat-form-field appearance="outline">
            <mat-label>Type</mat-label>

            <mat-select [(ngModel)]="typeFilter" (selectionChange)="onFilterChange()">
                <mat-option value="">All</mat-option>
                <mat-option value="MILESTONE">MILESTONE</mat-option>
                <mat-option value="PHASES">PHASES</mat-option>
                <mat-option value="STANDARD_EVENT">STANDARD_EVENT</mat-option>
            </mat-select>
        </mat-form-field>


        <mat-form-field appearance="outline">
            <mat-label>Status</mat-label>

            <mat-select [(ngModel)]="statusFilter" (selectionChange)="onFilterChange()">
                <mat-option value="">All</mat-option>
                <mat-option value="PENDING">PENDING</mat-option>
                <mat-option value="IN_PROGRESS">IN_PROGRESS</mat-option>
                <mat-option value="COMPLETED">COMPLETED</mat-option>
                <mat-option value="CANCELLED">CANCELLED</mat-option>
            </mat-select>
        </mat-form-field>


        <button mat-stroked-button color="warn" (click)="clearFilters()">
            Clear
        </button>

    </div>

    <div *ngIf="loading" class="loading">
        Loading events...
    </div>

    <div *ngIf="!loading && events.length === 0" class="empty">
        No events yet for this engagement.
    </div>

    <div *ngIf="!loading && events.length > 0" class="timeline">

        <div *ngFor="let event of events" class="timeline-item">


            <div class="timeline-icon">
                <mat-icon>event</mat-icon>
            </div>


            <div class="timeline-date">
                {{ event.date | date:'medium' }}
            </div>


            <div class="timeline-content">

                <h3>{{ event.title }}</h3>

                <p>{{ event.description }}</p>

                <div class="tags">

          <span class="status" [ngClass]="event.status">
            {{ event.status }}
          </span>

                    <span class="type">
            {{ event.type }}
          </span>

                </div>

            </div>

        </div>

    </div>

</div>

<app-title (create)="create()" [createAction]="true" subtitle="Gestión" title="Procedimientos Legales"></app-title>

<div class="filters-card">
    <app-filter-input (enter)="search()" [(value)]="criteria.title" title="Titulo"></app-filter-input>
    <app-filter-input (enter)="search()" [(value)]="criteria.task" title="Tarea"></app-filter-input>
</div>

<app-crud (delete)="delete($event)" (read)="read($event)" (searchAll)="search()"
          (update)="update($event)"
          [columns]="columns" (create)="create()" [data]="templates" [deleteAction]="deleteVisibility"
          [item]="template" [readAction]="true" [secureDelete]="true">
</app-crud>

<div class="events-toolbar">
    <button (click)="goBack()" mat-raised-button>
        <mat-icon>arrow_back</mat-icon>
        Volver a Hojas de Encargo
    </button>
</div>
<div style="display:flex; gap:10px">

    <button mat-raised-button color="primary" (click)="goToTimeline()" class="timeline-btn">
        <mat-icon>timeline</mat-icon>
        <span>Ver línea temporal</span>
    </button>


</div>


<app-crud
        (create)="create()"
        (read)="read($event)"
        (update)="update($event)"
        (delete)="delete($event)"
        (comments)="comments($event)"
        (searchAll)="search()"
        [data]="events$"
        [item]="event$"
        [deleteAction]="true"
        [commentsAction]="true"
        [hiddenFields]="['id', 'engagementLetterId', 'createdDate', 'comments']"
        [columnOrder]="['title','description', 'eventDate', 'type', 'status' ]"
        [title]="title">
</app-crud>

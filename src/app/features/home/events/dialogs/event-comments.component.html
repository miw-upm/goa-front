<h2 mat-dialog-title>Comentarios del evento</h2>

<mat-dialog-content class="comments-container">
    @if (eventTitle) {
        <p class="event-title">{{ eventTitle }}</p>
    }

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Añadir comentario</mat-label>
        <textarea
            matInput
            rows="4"
            [formControl]="commentControl"
            placeholder="Escribe aquí el comentario"></textarea>
        @if (commentControl.hasError('required')) {
            <mat-error>
                El comentario no puede estar vacío
            </mat-error>
        }
    </mat-form-field>

    <div class="comment-submit">
        <button
            mat-raised-button
            color="primary"
            (click)="addComment()"
            [disabled]="submitting">
            Añadir comentario
        </button>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cerrar</button>
</mat-dialog-actions>

<app-filter-input (enter)="search()" [(value)]="criteria.customer" title="En varios campos - Clientes"></app-filter-input>
<app-filter-input (enter)="search()" [(value)]="criteria.mobile" title="Móvil"></app-filter-input>
<app-filter-input (enter)="search()" [(value)]="criteria.firstName" title="Nombre"></app-filter-input>

<app-crud (create)="create()" (link)="link($event)" (read)="read($event)" (searchAll)="search()"

</app-crud>

<app-title (create)="create()" [createAction]="true" subtitle="Gestion" title="Pagos"></app-title>

<div class="filters-card">
    <app-filter-input (enter)="search()" [(value)]="criteria.client" title="Cliente"></app-filter-input>
    <app-filter-date [(date)]="criteria.fromDate" title="Desde"></app-filter-date>
</div>

<app-crud
        (create)="create()"
        (delete)="delete($event)"
        (read)="read($event)"
        (searchAll)="search()"
        (update)="update($event)"
        [columns]="columns"
        [data]="payments"
        [deleteAction]="deleteVisibility"
        [item]="payment"
        [secureDelete]="true"
        [title]="'Pagos'">
</app-crud>

<h4 mat-dialog-title>{{ title }}</h4>

<mat-dialog-content>
    <div class="zone-card zone-card--column">
        <div class="zone-row">
            <span class="zone-title">Cliente</span>
            <app-search-by-customer
                    (userChange)="setUser($event)"
                    title="Buscar cliente"></app-search-by-customer>
        </div>

        @if (selectedUser) {
            <app-form-customer
                    (remove)="removeUser()"
                    [fullName]="(selectedUser.firstName ?? '') + ' ' + (selectedUser.familyName ?? '')"
                    [mobile]="selectedUser.mobile">
            </app-form-customer>
        }
    </div>

    <div class="zone-card zone-card--column">
        <span class="zone-title">Datos del pago</span>

        <app-form-select
                [(selected)]="engagementId"
                [values]="engagementIds"
                label="Id de Hoja de Encargo"/>

        <app-form-field
                #amountNg
                [(value)]="payment.amount"
                [min]="0.01"
                [required]="true"
                [step]="0.01"
                errorMessage="Obligatorio y mayor que 0"
                label="Importe"
                type="number"/>

        <app-form-date
                [(value)]="paymentDate"
                label="Fecha"/>

        <app-form-select
                [(selected)]="payment.method"
                [capitalize]="true"
                [required]="true"
                [values]="methods"
                label="Metodo de pago"/>
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <button mat-dialog-close mat-raised-button>Cancelar</button>
    @if (isCreate()) {
        <button
                (click)="create()"
                [disabled]="!canSubmit() || formInvalid(amountNg.ngModel)"
                color="primary"
                mat-raised-button>
            <mat-icon matButtonIcon>add</mat-icon>
            Crear
        </button>
    } @else {
        <button
                (click)="update()"
                [disabled]="!canSubmit() || formInvalid(amountNg.ngModel)"
                color="primary"
                mat-raised-button>
            Guardar
        </button>
    }
</mat-dialog-actions>

<div class="events-toolbar">
    <button (click)="goBack()" mat-raised-button>
        <mat-icon>arrow_back</mat-icon>
        Volver a Hojas de Encargo
    </button>
</div>


<app-crud
        (searchAll)="search()"
        [data]="alerts$"
        [readAction]="false"
        [updateAction]="false"
        [deleteAction]="false"
        [createAction]="false"
        [hiddenFields]="['id']"
        [columnOrder]="['title', 'dueDate', 'status']"
        [title]="title">
</app-crud>

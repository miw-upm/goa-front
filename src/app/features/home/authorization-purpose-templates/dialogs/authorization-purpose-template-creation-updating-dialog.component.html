<h4 mat-dialog-title>{{ title }}</h4>
<mat-dialog-content>
    <app-form-textarea #purposeNg [(value)]="template.purpose" [required]="true" errorMessage="Obligatorio"
                       label="Prop&oacute;sito"/>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-dialog-close mat-raised-button>Cancelar</button>
    @if (isCreate()) {
        <button (click)="create()" [disabled]="formInvalid(purposeNg.ngModel)" color="primary" mat-raised-button>
            <mat-icon matButtonIcon>add</mat-icon>
            Crear
        </button>
    } @else {
        <button (click)="update()" [disabled]="formInvalid(purposeNg.ngModel)" color="primary" mat-raised-button>
            Guardar
        </button>
    }
</mat-dialog-actions>

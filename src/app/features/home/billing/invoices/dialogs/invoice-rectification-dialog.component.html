<h4 mat-dialog-title>Factura Rectificativa</h4>

<mat-dialog-content>
    <div class="zone-card zone-card--column">
        <span class="zone-title">Factura original</span>

        <app-form-field
                #seriesNg
                [(value)]="series"
                [required]="true"
                errorMessage="Obligatorio"
                label="Serie"/>

        <app-form-field
                #numberNg
                [(value)]="number"
                [max]="10000"
                [min]="1"
                [required]="true"
                [step]="1"
                errorMessage="Obligatorio, entero entre 1 y 10000"
                label="Número"
                type="number"/>
    </div>

    <div class="zone-card zone-card--column">
        <span class="zone-title">Motivo</span>
        <app-form-textarea
                #reasonNg
                [(value)]="reason"
                [required]="true"
                errorMessage="Obligatorio"
                label="Motivo"/>
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <button mat-dialog-close mat-raised-button>Cancelar</button>
    <button (click)="create()"
            [disabled]="!canCreate() || formInvalid(seriesNg.ngModel, numberNg.ngModel, reasonNg.ngModel)"
            color="primary"
            mat-raised-button>
        <mat-icon matButtonIcon>add</mat-icon>
        Crear
    </button>
</mat-dialog-actions>

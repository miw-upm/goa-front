<h4 mat-dialog-title>{{ title }}</h4>

<mat-dialog-content>
    <div class="zone-card zone-card--column">
        <span class="zone-title">Cliente de facturacion</span>

        @if (isCreate()) {
            <div class="zone-row">
                <app-search-by-customer
                        (userChange)="setUser($event)"
                        title="Buscar cliente">
                </app-search-by-customer>
            </div>

            @if (selectedUser) {
                <app-form-customer
                        (remove)="removeUser()"
                        [fullName]="(selectedUser.firstName ?? '') + ' ' + (selectedUser.familyName ?? '')"
                        [mobile]="selectedUser.mobile">
                </app-form-customer>
            }
        } @else {
            <app-form-field
                    [(value)]="invoice.billingInfo.fullName"
                    [required]="true"
                    errorMessage="Obligatorio"
                    label="Nombre fiscal"/>
            <app-form-field
                    [(value)]="invoice.billingInfo.identity"
                    [required]="true"
                    errorMessage="Obligatorio"
                    label="Identidad"/>
            <app-form-textarea
                    [(value)]="invoice.billingInfo.fullAddress"
                    [required]="true"
                    errorMessage="Obligatorio"
                    label="Direccion fiscal"/>
        }
    </div>

    <div class="zone-card zone-card--column">
        <span class="zone-title">Datos de factura</span>

        <app-form-textarea
            #conceptNg
            [(value)]="invoice.concept"
            [required]="true"
            errorMessage="Obligatorio"
            label="Concepto"/>
        <app-form-field
            #baseAmountNg
            [(value)]="invoice.baseAmount"
            [min]="0.01"
            [required]="true"
            [step]="0.01"
            errorMessage="Obligatorio y mayor que 0"
            label="Base imponible"
            type="number"/>

        <app-form-field
                [(value)]="baseExpense"
                [min]="0"
                [step]="0.01"
                errorMessage="Debe ser mayor o igual que 0"
                label="Base gastos"
                type="number"/>
        <app-form-field
                [(value)]="vatExpense"
                [min]="0"
                [step]="0.01"
                errorMessage="Debe ser mayor o igual que 0"
                label="IVA gastos"
                type="number"/>


        @if (!isCreate()) {
            <app-form-date [(value)]="operationDate" label="Fecha de operacion"/>
        }
    </div>

    <div class="zone-card zone-card--column">
        <div class="zone-row">
            <span class="zone-title">Descuentos (€)</span>
            <button (click)="addDiscount()" color="primary" mat-flat-button type="button">
                <mat-icon>add</mat-icon>
                Crear
            </button>
        </div>

        @for (discount of invoice.discounts; track $index; let i = $index) {
            <div class="item-card">
                <mat-form-field class="full-width">
                    <mat-label>Descuento</mat-label>
                    <input [(ngModel)]="invoice.discounts[i]" matInput min="0" step="0.01" type="number">
                </mat-form-field>
                <button (click)="removeDiscount(i)" aria-label="Eliminar descuento" mat-icon-button type="button">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
        }
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <button mat-dialog-close mat-raised-button>Cancelar</button>
    @if (isCreate()) {
        <button (click)="create()"
                [disabled]="!canCreate() || formInvalid(conceptNg.ngModel, baseAmountNg.ngModel)"
                color="primary"
                mat-raised-button>
            <mat-icon matButtonIcon>add</mat-icon>
            Crear
        </button>
    } @else {
        <button (click)="update()"
                [disabled]="!canUpdate() || formInvalid(conceptNg.ngModel, baseAmountNg.ngModel)"
                color="primary"
                mat-raised-button>
            Guardar
        </button>
    }
</mat-dialog-actions>

<div class="document-ai-container">
  <mat-card class="upload-card">
    <mat-card-header>
      <mat-card-title>Subida de Documentos (Document AI)</mat-card-title>
      <mat-card-subtitle>Sube un archivo legal en formato PDF para su análisis</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="upload-content">
      <input
        type="file"
        #fileInput
        hidden
        accept="application/pdf"
        (change)="onFileSelected($event)"
      />
      <div class="upload-actions">
        <button mat-raised-button color="primary" (click)="triggerFileInput()" [disabled]="isUploading">
          <mat-icon>upload_file</mat-icon>
          Seleccionar Documento PDF
        </button>
        <button
          mat-raised-button
          color="accent"
          *ngIf="selectedFile && !isUploading"
          (click)="uploadSelectedFile()"
        >
          <mat-icon>cloud_upload</mat-icon>
          Guardar documento
        </button>
        <mat-spinner *ngIf="isUploading" diameter="24"></mat-spinner>
      </div>
      <div *ngIf="selectedFile && !isUploading" class="upload-status pending">
        <mat-icon>insert_drive_file</mat-icon>
        <span>Archivo listo para subir: </span>
        <strong>{{ selectedFileName }}</strong>
        <button mat-icon-button (click)="clearSelectedFile()" title="Quitar documento" class="clear-btn">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div *ngIf="uploadSuccess && !isUploading" class="upload-status success">
        <mat-icon>check_circle</mat-icon>
        <span>Subido correctamente: </span>
        <strong>{{ selectedFileName }}</strong>
      </div>
    </mat-card-content>
  </mat-card>
</div>

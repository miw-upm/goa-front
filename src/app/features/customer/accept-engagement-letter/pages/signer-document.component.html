<app-document-acceptance
        [downloadEnabled]="true"
        [acceptanceEnabled]="true"
        [signatureEnabled]="false"
        [title]="'Descarga, aceptación y firma de la Hoja de Encargo Profesional'"
        [customerName]="customerName"
        [confirmationMessage]="'Su firma ha sido registrada correctamente. Le agradecemos la confianza...'"
        (downloadRequested)="onDownload()"
        (submitted)="onSubmit($event)">
</app-document-acceptance>

name: CD. AWS Lightsail
on:
  push:
    branches:
      - staging

jobs:
  cd:
    name: Build & Push GitHub Package & Deploy on AWS Lightsail
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏷️ Get version from package.json
        run: |
          echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "VERSION=$(node -pe "require('./package.json').version")" >> $GITHUB_ENV
          echo "PACKAGE_PATH=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV

      - name: 🏗️ Build Angular app
        run: npm run build-prod

      - name: ☁️ Upload build to AWS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.AWS_LIGHTSAIL_IP_STAGING }}
          username: ${{ secrets.AWS_LIGHTSAIL_USER_STAGING }}
          port: 22 # SSH
          key: ${{ secrets.AWS_LIGHTSAIL_SSH_KEY_STAGING }}
          source: "dist/goa-front/**"
          target: "~/goa-front-temp"

      - name: 🚀 Deploy frontend on Nginx (AWS Lightsail)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.AWS_LIGHTSAIL_IP_STAGING }}
          username: ${{ secrets.AWS_LIGHTSAIL_USER_STAGING }}
          port: 22
          key: ${{ secrets.AWS_LIGHTSAIL_SSH_KEY_STAGING }}
          script: |
            sudo mkdir -p /var/www/goa-front
            sudo rm -rf /var/www/goa-front/*
            sudo cp -r ~/goa-front-temp/dist/goa-front/browser/* /var/www/goa-front/
            sudo rm -rf ~/goa-front-temp
            sudo systemctl reload nginx
